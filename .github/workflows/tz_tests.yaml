name: Time zone tests

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install

      - name: Offset tests
        run: mise //pkgs/core:test/tz/offset

      - name: IANA tests
        run: mise //pkgs/core:test/tz/iana
